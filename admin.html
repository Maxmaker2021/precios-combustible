<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campo Simple — Panel Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; color: #111; }

  /* HEADER */
  .header {
    background: #2C703C; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .brand { color: #fff; font-size: 15px; font-weight: 600; }
  .brand-sub { color: rgba(255,255,255,0.65); font-size: 11px; }
  .header-right { display: flex; gap: 8px; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px 24px 0; }
  .stat { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e5e7eb; }
  .stat-val { font-size: 24px; font-weight: 700; color: #111; }
  .stat-label { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .stat-val.green { color: #2C703C; }
  .stat-val.amber { color: #D97706; }
  .stat-val.red { color: #DC2626; }

  /* TOOLBAR */
  .toolbar { padding: 16px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 12px; }
  .search-wrap input { border: none; background: transparent; font-size: 13px; color: #111; width: 100%; outline: none; }
  .search-wrap input::placeholder { color: #9ca3af; }
  select { background: #fff; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #111; outline: none; cursor: pointer; }
  .btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn-primary { background: #2C703C; color: #fff; }
  .btn-primary:hover { background: #3a8f4f; }
  .btn-secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; }
  .btn-secondary:hover { background: #f9fafb; }

  /* TABLE */
  .table-wrap { padding: 0 24px 24px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; font-size: 13px; }
  thead { background: #f9fafb; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
  td { padding: 11px 14px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9fafb; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-ypf { background: #FEF3C7; color: #92400E; }
  .badge-axion { background: #EDE9FE; color: #5B21B6; }
  .badge-puma { background: #FEE2E2; color: #991B1B; }
  .badge-ok { background: #D1FAE5; color: #065F46; }
  .badge-pending { background: #FEF3C7; color: #92400E; }
  .badge-new { background: #DBEAFE; color: #1E40AF; }

  .actions { display: flex; gap: 6px; }
  .action-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid #e5e7eb; background: #fff; font-size: 11px; cursor: pointer; color: #374151; font-family: inherit; transition: all 0.1s; white-space: nowrap; }
  .action-btn:hover { background: #f3f4f6; }
  .action-btn.wa { border-color: #22C55E40; color: #16A34A; background: #F0FDF4; }
  .action-btn.wa:hover { background: #DCFCE7; }
  .action-btn.copied { border-color: #2C703C; color: #2C703C; background: #eaf3de; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 18px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: #6b7280; font-weight: 500; }
  .field input, .field select { padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 7px; font-size: 13px; color: #111; outline: none; font-family: inherit; }
  .field input:focus, .field select:focus { border-color: #2C703C; box-shadow: 0 0 0 2px rgba(44,112,60,0.12); }
  .modal-footer { padding: 14px 20px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; justify-content: flex-end; }

  /* LINK PREVIEW */
  .link-preview { background: #f3f4f6; border-radius: 8px; padding: 10px 12px; font-size: 11px; color: #6b7280; font-family: monospace; word-break: break-all; margin-top: 4px; }

  .empty { text-align: center; padding: 40px; color: #9ca3af; font-size: 13px; }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .toolbar { padding: 12px 16px; }
    .table-wrap { padding: 0 16px 16px; }
    .stats { padding: 16px 16px 0; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">🌱</div>
    <div>
      <div class="brand">Campo Simple</div>
      <div class="brand-sub">Panel de Estaciones</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-secondary" onclick="exportCSV()">↓ Exportar</button>
    <button class="btn btn-primary" onclick="abrirModal()">+ Agregar estación</button>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <div class="stat-val" id="statTotal">0</div>
    <div class="stat-label">Estaciones totales</div>
  </div>
  <div class="stat">
    <div class="stat-val green" id="statOk">0</div>
    <div class="stat-label">Respondieron</div>
  </div>
  <div class="stat">
    <div class="stat-val amber" id="statPending">0</div>
    <div class="stat-label">Sin respuesta</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="statLinks">0</div>
    <div class="stat-label">Links generados</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar por empresa, localidad o contacto..." oninput="renderTabla()">
  </div>
  <select id="filterCategoria" onchange="renderTabla()">
    <option value="">Todas las marcas</option>
    <option value="YPF">YPF Agro</option>
    <option value="Axion">Axion Agro</option>
    <option value="Puma">Puma Agro</option>
  </select>
  <select id="filterProvincia" onchange="renderTabla()">
    <option value="">Todas las provincias</option>
  </select>
  <select id="filterEstado" onchange="renderTabla()">
    <option value="">Todos los estados</option>
    <option value="ok">Respondió</option>
    <option value="pending">Pendiente</option>
    <option value="new">Sin enviar</option>
  </select>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Marca</th>
        <th>Empresa</th>
        <th>Localidad</th>
        <th>Contacto</th>
        <th>Teléfono</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaBody"></tbody>
  </table>
</div>

<!-- MODAL AGREGAR/EDITAR -->
<div class="overlay" id="modalOverlay" onclick="cerrarModalSiFuera(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Nueva estación</div>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editIdx" value="-1">
      <div class="field-row">
        <div class="field">
          <label>Marca *</label>
          <select id="fCategoria">
            <option value="Combustible YPF">YPF Agro</option>
            <option value="Combustible Axion">Axion Agro</option>
            <option value="Combustible Puma">Puma Agro</option>
          </select>
        </div>
        <div class="field">
          <label>Empresa *</label>
          <input type="text" id="fEmpresa" placeholder="Nombre de la empresa">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Localidad *</label>
          <input type="text" id="fLocalidad" placeholder="Ciudad">
        </div>
        <div class="field">
          <label>Provincia *</label>
          <input type="text" id="fProvincia" placeholder="Provincia">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Contacto</label>
          <input type="text" id="fNombre" placeholder="Nombre y apellido">
        </div>
        <div class="field">
          <label>Rol</label>
          <input type="text" id="fRol" placeholder="Ej: Gerente Comercial">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Teléfono WhatsApp</label>
          <input type="text" id="fTelefono" placeholder="5493XXXXXXXXXX">
        </div>
        <div class="field">
          <label>Correo</label>
          <input type="email" id="fCorreo" placeholder="correo@ejemplo.com">
        </div>
      </div>
      <div class="field">
        <label>Link del formulario (se genera automáticamente)</label>
        <div class="link-preview" id="linkPreview">Completá empresa y localidad para generar el link</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEstacion()">Guardar estación</button>
    </div>
  </div>
</div>

<script>
const BASE_URL = "https://maxmaker2021.github.io/precios-combustible/";
const LS_KEY = "campo_simple_estaciones";

// ── Estado ──────────────────────────────────────────────────────────────────
let estaciones = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
let linksGenerados = parseInt(localStorage.getItem("cs_links") || "0");

// ── Datos iniciales demo ─────────────────────────────────────────────────────
if (estaciones.length === 0) {
  estaciones = [
    { id: "EST-001", categoria: "Combustible YPF", empresa: "YPF Agro Avanzar SRL", localidad: "Cañada Rosquín", provincia: "Santa Fe", nombre: "Leo Marquez", telefono: "5493415917703", correo: "marcuezleonel@avanzarsa.com.ar", rol: "Logística", estado: "pending" },
    { id: "EST-002", categoria: "Combustible YPF", empresa: "YPF Agro Avanzar SRL", localidad: "Santa Teresa", provincia: "Santa Fe", nombre: "Federico Campagnaro", telefono: "5493401532738", correo: "campagnarofederico@avanzarsa.com.ar", rol: "Logística", estado: "pending" },
    { id: "EST-003", categoria: "Combustible YPF", empresa: "YPF Agro CAON ATILIO J Y CAON MIGUEL", localidad: "Villa María", provincia: "Córdoba", nombre: "Lucas Caon", telefono: "5493354201218", correo: "", rol: "Gerente Comercial", estado: "new" },
    { id: "EST-004", categoria: "Combustible YPF", empresa: "YPF Agro ESMACOL SA", localidad: "Santa Clara de Buena Vista", provincia: "Santa Fe", nombre: "Gonzalo Canali", telefono: "5493484435289", correo: "", rol: "Gerente Comercial", estado: "new" },
    { id: "EST-005", categoria: "Combustible YPF", empresa: "YPF Agro SINERGIA SA", localidad: "Correa", provincia: "Santa Fe", nombre: "Guido Parnier", telefono: "5493387407917", correo: "", rol: "Gerente Comercial", estado: "ok" },
    { id: "EST-006", categoria: "Combustible Axion", empresa: "AXION AGRO Petroliera del Suquia SRL", localidad: "La Playosa", provincia: "Córdoba", nombre: "Federico Cerutti", telefono: "5493354012919", correo: "", rol: "Comercial Combustible", estado: "pending" },
    { id: "EST-007", categoria: "Combustible Axion", empresa: "AXION AGRO La Barranca SRL", localidad: "Río Cuarto", provincia: "Córdoba", nombre: "Juan Cappellari", telefono: "5493586122001", correo: "", rol: "Comercial Combustible", estado: "new" },
    { id: "EST-008", categoria: "Combustible Puma", empresa: "PUMA AGRO Maxima Energía SRL", localidad: "Totoras", provincia: "Santa Fe", nombre: "Nestor Ambrogio", telefono: "5493475693943", correo: "", rol: "Comercial Combustible", estado: "ok" },
  ];
  guardarLS();
}

function guardarLS() {
  localStorage.setItem(LS_KEY, JSON.stringify(estaciones));
}

function generarId() {
  const max = estaciones.reduce((m, e) => Math.max(m, parseInt(e.id.replace("EST-","")) || 0), 0);
  return "EST-" + String(max + 1).padStart(3, "0");
}

function generarLink(empresa, localidad, id) {
  if (!empresa || !localidad) return "";
  const nombre = encodeURIComponent(`${empresa} — ${localidad}`);
  return `${BASE_URL}?id=${id}&nombre=${nombre}`;
}

function badgeCategoria(cat) {
  if (cat.includes("YPF")) return `<span class="badge badge-ypf">YPF Agro</span>`;
  if (cat.includes("Axion")) return `<span class="badge badge-axion">Axion Agro</span>`;
  if (cat.includes("Puma")) return `<span class="badge badge-puma">Puma Agro</span>`;
  return `<span class="badge">${cat}</span>`;
}

function badgeEstado(est) {
  if (est === "ok") return `<span class="badge badge-ok">✓ Respondió</span>`;
  if (est === "pending") return `<span class="badge badge-pending">⏳ Pendiente</span>`;
  return `<span class="badge badge-new">◦ Sin enviar</span>`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderTabla() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const cat = document.getElementById("filterCategoria").value;
  const prov = document.getElementById("filterProvincia").value;
  const est = document.getElementById("filterEstado").value;

  const filtradas = estaciones.filter(e => {
    const matchQ = !q || [e.empresa, e.localidad, e.nombre, e.provincia].some(v => v?.toLowerCase().includes(q));
    const matchCat = !cat || e.categoria.includes(cat);
    const matchProv = !prov || e.provincia === prov;
    const matchEst = !est || e.estado === est;
    return matchQ && matchCat && matchProv && matchEst;
  });

  const tbody = document.getElementById("tablaBody");
  if (filtradas.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">No se encontraron estaciones</td></tr>`;
    return;
  }

  tbody.innerHTML = filtradas.map((e, i) => {
    const link = generarLink(e.empresa, e.localidad, e.id);
    const idx = estaciones.indexOf(e);
    return `
      <tr>
        <td>${badgeCategoria(e.categoria)}</td>
        <td><strong>${e.empresa}</strong></td>
        <td>${e.localidad}<br><span style="color:#9ca3af;font-size:11px">${e.provincia}</span></td>
        <td>${e.nombre || "—"}<br><span style="color:#9ca3af;font-size:11px">${e.rol || ""}</span></td>
        <td>${e.telefono ? `<a href="tel:${e.telefono}" style="color:#2C703C;text-decoration:none">${e.telefono}</a>` : "—"}</td>
        <td>${badgeEstado(e.estado)}</td>
        <td>
          <div class="actions">
            <button class="action-btn wa" onclick="copiarLink(${idx}, this)" title="Copiar link">🔗 Link</button>
            ${e.telefono ? `<button class="action-btn wa" onclick="enviarWA(${idx})" title="Abrir WhatsApp">💬 WA</button>` : ""}
            <button class="action-btn" onclick="editarEstacion(${idx})">✏️</button>
            <button class="action-btn" onclick="cambiarEstado(${idx})" title="Cambiar estado">↻</button>
          </div>
        </td>
      </tr>
    `;
  }).join("");

  actualizarStats();
}

function actualizarStats() {
  document.getElementById("statTotal").textContent = estaciones.length;
  document.getElementById("statOk").textContent = estaciones.filter(e => e.estado === "ok").length;
  document.getElementById("statPending").textContent = estaciones.filter(e => e.estado === "pending").length;
  document.getElementById("statLinks").textContent = linksGenerados;
}

function poblarFiltros() {
  const provincias = [...new Set(estaciones.map(e => e.provincia).filter(Boolean))].sort();
  const sel = document.getElementById("filterProvincia");
  sel.innerHTML = `<option value="">Todas las provincias</option>` + provincias.map(p => `<option value="${p}">${p}</option>`).join("");
}

// ── Acciones ─────────────────────────────────────────────────────────────────
function copiarLink(idx, btn) {
  const e = estaciones[idx];
  const link = generarLink(e.empresa, e.localidad, e.id);
  navigator.clipboard.writeText(link).then(() => {
    btn.textContent = "✓ Copiado";
    btn.classList.add("copied");
    linksGenerados++;
    localStorage.setItem("cs_links", linksGenerados);
    actualizarStats();
    setTimeout(() => { btn.textContent = "🔗 Link"; btn.classList.remove("copied"); }, 2000);
  });
}

function enviarWA(idx) {
  const e = estaciones[idx];
  const link = generarLink(e.empresa, e.localidad, e.id);
  const msg = encodeURIComponent(`Hola${e.nombre ? " " + e.nombre.split(" ")[0] : ""}! Te enviamos el formulario de Campo Simple para actualizar los precios de combustible 👇\n\n${link}\n\nCualquier consulta estamos disponibles. ¡Gracias!`);
  const tel = e.telefono.replace(/\D/g, "");
  window.open(`https://wa.me/${tel}?text=${msg}`, "_blank");
  linksGenerados++;
  localStorage.setItem("cs_links", linksGenerados);
  actualizarStats();
}

function cambiarEstado(idx) {
  const estados = ["new", "pending", "ok"];
  const actual = estaciones[idx].estado;
  const siguiente = estados[(estados.indexOf(actual) + 1) % estados.length];
  estaciones[idx].estado = siguiente;
  guardarLS();
  renderTabla();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function abrirModal(idx = -1) {
  document.getElementById("editIdx").value = idx;
  if (idx >= 0) {
    const e = estaciones[idx];
    document.getElementById("modalTitle").textContent = "Editar estación";
    document.getElementById("fCategoria").value = e.categoria;
    document.getElementById("fEmpresa").value = e.empresa;
    document.getElementById("fLocalidad").value = e.localidad;
    document.getElementById("fProvincia").value = e.provincia;
    document.getElementById("fNombre").value = e.nombre || "";
    document.getElementById("fRol").value = e.rol || "";
    document.getElementById("fTelefono").value = e.telefono || "";
    document.getElementById("fCorreo").value = e.correo || "";
    actualizarLinkPreview();
  } else {
    document.getElementById("modalTitle").textContent = "Nueva estación";
    ["fEmpresa","fLocalidad","fProvincia","fNombre","fRol","fTelefono","fCorreo"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("linkPreview").textContent = "Completá empresa y localidad para generar el link";
  }
  document.getElementById("modalOverlay").classList.add("open");
}

function editarEstacion(idx) { abrirModal(idx); }

function cerrarModal() { document.getElementById("modalOverlay").classList.remove("open"); }

function cerrarModalSiFuera(e) { if (e.target === document.getElementById("modalOverlay")) cerrarModal(); }

function actualizarLinkPreview() {
  const emp = document.getElementById("fEmpresa").value;
  const loc = document.getElementById("fLocalidad").value;
  const idx = parseInt(document.getElementById("editIdx").value);
  const id = idx >= 0 ? estaciones[idx].id : "EST-XXX";
  const link = generarLink(emp, loc, id);
  document.getElementById("linkPreview").textContent = link || "Completá empresa y localidad para generar el link";
}

["fEmpresa","fLocalidad"].forEach(id => {
  document.getElementById(id).addEventListener("input", actualizarLinkPreview);
});

function guardarEstacion() {
  const idx = parseInt(document.getElementById("editIdx").value);
  const data = {
    categoria: document.getElementById("fCategoria").value,
    empresa: document.getElementById("fEmpresa").value.trim(),
    localidad: document.getElementById("fLocalidad").value.trim(),
    provincia: document.getElementById("fProvincia").value.trim(),
    nombre: document.getElementById("fNombre").value.trim(),
    rol: document.getElementById("fRol").value.trim(),
    telefono: document.getElementById("fTelefono").value.trim(),
    correo: document.getElementById("fCorreo").value.trim(),
    estado: idx >= 0 ? estaciones[idx].estado : "new",
  };
  if (!data.empresa || !data.localidad) { alert("Empresa y localidad son obligatorios"); return; }
  if (idx >= 0) {
    estaciones[idx] = { ...estaciones[idx], ...data };
  } else {
    data.id = generarId();
    estaciones.push(data);
  }
  guardarLS();
  poblarFiltros();
  renderTabla();
  cerrarModal();
}

// ── Exportar CSV ─────────────────────────────────────────────────────────────
function exportCSV() {
  const headers = ["ID","Marca","Empresa","Localidad","Provincia","Contacto","Rol","Teléfono","Correo","Estado","Link"];
  const rows = estaciones.map(e => [
    e.id, e.categoria, e.empresa, e.localidad, e.provincia,
    e.nombre, e.rol, e.telefono, e.correo, e.estado,
    generarLink(e.empresa, e.localidad, e.id)
  ].map(v => `"${(v||"").replace(/"/g,'""')}"`).join(","));
  const csv = [headers.join(","), ...rows].join("\n");
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = "campo-simple-estaciones.csv";
  a.click();
}

// ── Init ─────────────────────────────────────────────────────────────────────
poblarFiltros();
renderTabla();
</script>
</body>
</html>
